name: Publish npm packages

# Triggers:
#   - Push a tag matching `v*` (e.g. `v0.2.0`) → publish run.
#   - Manual `workflow_dispatch` from the Actions tab → publish run.
#
# For each of the four npm packages (`textmate/`, `shiki/`, `highlightjs/`,
# `prismjs/`), the workflow compares the local version in `package.json`
# against the version on the npm registry and publishes only if newer.
# This means a single tag can publish any subset of the packages — bump
# what you want shipped, leave the others alone.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing
    defaults:
      run:
        working-directory: ddot.it-syntax-tools
    steps:
      # Sibling checkouts — the conformance harnesses read inputs and
      # goldens from ../ddot.it/test-data/cases/.
      - name: Checkout ddot.it-syntax-tools
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: ddot.it-syntax-tools

      - name: Checkout ddot.it (test-data corpus)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Calpano/ddot.it
          path: ddot.it

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Install Node deps
        run: npm ci

      # Gate: don't publish if the canonical-token corpus disagrees with
      # any of the npm-side implementations. Rouge / Pygments / Chroma
      # need Ruby / Python / Docker which we skip here (they're tested in
      # the conformance.yml workflow and locally before tagging).
      - name: Conformance — TextMate
        run: npm run conformance:textmate
      - name: Conformance — Shiki
        run: npm run conformance:shiki
      - name: Conformance — highlight.js
        run: npm run conformance:highlightjs
      - name: Conformance — Prism.js
        run: npm run conformance:prismjs

      # Publish each package only if its local version is newer than the
      # registry's. Authentication is via OIDC trusted publishing —
      # each package on npm has Calpano/ddot.it-syntax-tools + this
      # workflow file configured as a trusted publisher, so npm CLI
      # (≥11.5) auto-fetches the OIDC token. No NPM_TOKEN needed.
      # `--provenance` attaches a sigstore attestation to each publish.
      - name: Publish if newer
        run: |
          set -e
          published=()
          skipped=()
          for d in textmate shiki highlightjs prismjs; do
            cd "$GITHUB_WORKSPACE/ddot.it-syntax-tools/$d"
            name=$(node -p "require('./package.json').name")
            local_v=$(node -p "require('./package.json').version")
            registry_v=$(npm view "$name" version 2>/dev/null || echo "0.0.0")
            if [ "$local_v" != "$registry_v" ]; then
              echo "::group::Publishing $name@$local_v (registry has $registry_v)"
              npm publish --provenance
              published+=("$name@$local_v")
              echo "::endgroup::"
            else
              echo "$name@$local_v already on registry — skipping"
              skipped+=("$name@$local_v")
            fi
          done

          echo
          echo "Published: ${published[*]:-(none)}"
          echo "Skipped:   ${skipped[*]:-(none)}"
          {
            echo "## Publish summary"
            echo
            echo "**Published:** ${published[*]:-(none)}"
            echo
            echo "**Skipped (already on registry):** ${skipped[*]:-(none)}"
          } >> "$GITHUB_STEP_SUMMARY"
