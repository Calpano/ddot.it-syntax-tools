name: Publish pygments-ddot to PyPI

# Triggers:
#   - Push a tag matching `pypi-v*` (e.g. `pypi-v0.2.0`).
#   - Manual `workflow_dispatch` from the Actions tab.
#
# Authenticates via PyPI Trusted Publishing (OIDC). The PyPI project
# `pygments-ddot` must have a trusted-publisher entry pointing to:
#   Owner:    Calpano
#   Repo:     ddot.it-syntax-tools
#   Workflow: publish-pypi.yml
# (Configure at https://pypi.org/manage/project/pygments-ddot/settings/publishing/)
# No token in repo secrets is needed.

on:
  push:
    tags: ['pypi-v*']
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for OIDC trusted publishing
    defaults:
      run:
        working-directory: ddot.it-syntax-tools
    steps:
      - name: Checkout ddot.it-syntax-tools
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          path: ddot.it-syntax-tools

      - name: Checkout ddot.it (test-data corpus)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: Calpano/ddot.it
          path: ddot.it

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install Pygments build

      - name: Conformance — Pygments
        run: python tools/conformance-pygments.py

      - name: Check version vs registry
        id: vercheck
        working-directory: ddot.it-syntax-tools/pygments
        run: |
          local_v=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          registry_v=$(curl -fsS https://pypi.org/pypi/pygments-ddot/json 2>/dev/null | python -c "import sys, json; print(json.load(sys.stdin)['info']['version'])" 2>/dev/null || echo "0.0.0")
          echo "local: $local_v, registry: $registry_v"
          echo "local=$local_v"             >> "$GITHUB_OUTPUT"
          echo "registry=$registry_v"       >> "$GITHUB_OUTPUT"
          if [ "$local_v" != "$registry_v" ]; then
            echo "should_publish=true"      >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false"     >> "$GITHUB_OUTPUT"
          fi

      - name: Build wheel + sdist
        if: steps.vercheck.outputs.should_publish == 'true'
        working-directory: ddot.it-syntax-tools/pygments
        run: |
          rm -rf dist build *.egg-info
          python -m build
          ls -la dist/

      - name: Publish via OIDC trusted publishing
        if: steps.vercheck.outputs.should_publish == 'true'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: ddot.it-syntax-tools/pygments/dist

      - name: Summary
        # Defaults' working-directory doesn't apply to running shell here — we're
        # only writing to a file path we don't care about resolving.
        working-directory: ${{ github.workspace }}
        run: |
          if [ "${{ steps.vercheck.outputs.should_publish }}" == "true" ]; then
            {
              echo "## PyPI publish summary"
              echo
              echo "**Published:** pygments-ddot@${{ steps.vercheck.outputs.local }}"
              echo
              echo "https://pypi.org/project/pygments-ddot/${{ steps.vercheck.outputs.local }}/"
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## PyPI publish summary"
              echo
              echo "**Skipped:** pygments-ddot@${{ steps.vercheck.outputs.local }} already on PyPI"
            } >> "$GITHUB_STEP_SUMMARY"
          fi
